<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="General Ships Chandler Acropolis - Su socio confiable en suministros para flotas marítimas." />
        <title>Acropolis | General Ships Chandler</title>
        <!-- Script para manejar redirecciones SPA en GitHub Pages -->
        <script type="text/javascript">
            // Single Page Apps for GitHub Pages
            // https://github.com/rafgraph/spa-github-pages
            (function(l) {
                if (l.search[1] === '/' ) {
                    var decoded = l.search.slice(1).split('&').map(function(s) {
                        return s.replace(/~and~/g, '&')
                    }).join('?');
                    window.history.replaceState(null, null,
                        l.pathname.slice(0, -1) + decoded + l.hash
                    );
                }
            }(window.location))
        </script>
    </head>
    <body>
        <noscript>Necesitas habilitar JavaScript para ejecutar esta aplicación.</noscript>
        <div id="root"></div>
    </body>
</html>
